version: "2"

# Field mappings per CRM key (e.g. hubspot). Paths use meeting.model_dump() shape:
# meeting.title, meeting.extraction.*, meeting.crm_updates.deal.*
crm_mappings:
  hubspot:
    entities:
      deal:
        fields:
          dealname:
            source: "meeting.title"
          amount:
            source: "meeting.crm_updates.deal.amount"
          dealstage:
            source: "meeting.crm_updates.deal.stage"
