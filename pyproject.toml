[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "UP",
  "B",
  "SIM",
  "PIE",
  "RUF",
]
ignore = [
  "E501", # handled by formatter (and long strings/prompt templates)
  "B008", # FastAPI's Depends() is intentionally used in function signatures
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.ruff.lint.per-file-ignores]
"app/db/session.py" = ["I001"]
"app/db/tables.py" = ["UP037"]
"scripts/evaluate.py" = ["I001"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
asyncio_mode = "auto"

[tool.mypy]
python_version = "3.12"
warn_redundant_casts = true
warn_unused_ignores = true
warn_return_any = true
no_implicit_optional = true
check_untyped_defs = true
disallow_untyped_defs = true
disallow_any_generics = true
strict_equality = true
ignore_missing_imports = true
